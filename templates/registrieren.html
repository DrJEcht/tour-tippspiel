<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Registrieren – Tippspiel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container py-5" style="max-width: 520px;">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h3 mb-4">👤 Benutzer anlegen</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post">
          <label class="form-label">Name</label>
          <input type="text" name="name" class="form-control mb-3" required>

          <label class="form-label">Passwort</label>
          <input type="password" name="passwort" class="form-control mb-4" required>

          <button class="btn btn-primary w-100">Registrieren</button>
        </form>

        <p class="mt-3 mb-0">
          <a href="{{ url_for('login') }}">Schon registriert? Zum Login</a><br>
          <a href="{{ url_for('index') }}">Zur Übersicht</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
